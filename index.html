<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo.css"></head>
<body>
    <div> <header>
            <h1 style="color: var(--primary);">TASKS</h1>
            <div id="task-stats">0/0 Completed</div></header>
            <form id="task-form">
            <input type="text" id="task-input" placeholder="Please Enter Your Task Here">
            <select id="task-category">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option></select>
            <select id="task-priority">
                <option value="Low">Low Priority</option>
                <option value="Medium" selected>Medium Priority</option>
                <option value="High">High Priority</option></select>
            <button type="submit">Add</button></form>
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button></div>
        <ul class="task-list" id="task-list"></ul></div>
    <script src="script.js"> </script></body></html>
